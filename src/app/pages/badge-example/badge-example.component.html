<h2 style="margin-top: 0">Example</h2>
<app-example>
  <app-tab-group>
    <app-tab label="Example">
      <div class="icons">
        <div class="icon" badge="1" badgeAriaLabel="1 new message">
          <app-icon name="phone" />
        </div>
        <div class="icon" badge="5" badgeAriaLabel="5 new messages">
          <app-icon name="bell" />
        </div>
        <div class="icon" badge="10" badgeAriaLabel="10 new messages">
          <app-icon name="mail" />
        </div>
      </div>
    </app-tab>
    <app-tab label="HTML">
      @if (fileContents['exampleHtml']) {
        <pre><code [highlightAuto]="fileContents['exampleHtml']"></code></pre>
      }
    </app-tab>
    <app-tab label="TS">
      @if (fileContents['exampleTs']) {
        <pre><code [highlightAuto]="fileContents['exampleTs']"></code></pre>
      }
    </app-tab>
    <app-tab label="SCSS">
      @if (fileContents['exampleScss']) {
        <pre><code [highlightAuto]="fileContents['exampleScss']"></code></pre>
      }
    </app-tab>
  </app-tab-group>
</app-example>
