<h2 style="margin-top: 0">Example</h2>
<app-example>
  <app-tab-group>
    <app-tab label="Example">
      <!-- Flat buttons -->
      <div class="buttons-example">
        <div class="buttons-example__label">Flat buttons</div>
        <div class="buttons-example__list">
          <button type="button" button view="flat">Basic</button>
          <button type="button" button view="flat" color="primary">
            Primary
          </button>
          <button type="button" button view="flat" color="secondary">
            Secondary
          </button>
          <button type="button" button view="flat" color="primary" disabled>
            Disabled
          </button>
          <a routerLink="#" button view="flat" color="primary">Link</a>
          <button type="button" button view="flat" color="primary">
            <app-icon name="mail" />
            <span>With icon</span>
          </button>
          <button
            type="button"
            button
            view="flat"
            color="primary"
            (click)="onFlatLoadingClick()"
            [loading]="flatLoading()">
            Click for loading
          </button>
        </div>
      </div>

      <!-- Stroked buttons -->
      <div class="buttons-example">
        <div class="buttons-example__label">Stroked buttons</div>
        <div class="buttons-example__list">
          <button type="button" button view="stroked">Basic</button>
          <button type="button" button view="stroked" color="primary">
            Primary
          </button>
          <button type="button" button view="stroked" color="secondary">
            Secondary
          </button>
          <button type="button" button view="stroked" color="primary" disabled>
            Disabled
          </button>
          <a routerLink="#" button view="stroked" color="primary">Link</a>
          <button type="button" button view="stroked" color="primary">
            <app-icon name="mail" />
            <span>With icon</span>
          </button>
          <button
            type="button"
            button
            view="stroked"
            color="primary"
            (click)="onStrokedLoadingClick()"
            [loading]="strokedLoading()">
            Click for loading
          </button>
        </div>
      </div>

      <!-- Icon flat buttons -->
      <div class="buttons-example">
        <div class="buttons-example__label">Icon flat buttons</div>
        <div class="buttons-example__list">
          <button type="button" button view="flat" isIcon>
            <app-icon name="mail" />
          </button>
          <button type="button" button view="flat" isIcon color="primary">
            <app-icon name="mail" />
          </button>
          <button type="button" button view="flat" isIcon color="secondary">
            <app-icon name="mail" />
          </button>
          <button
            type="button"
            button
            view="flat"
            isIcon
            color="primary"
            disabled>
            <app-icon name="mail" />
          </button>
        </div>
      </div>

      <!-- Icon stroked buttons -->
      <div class="buttons-example">
        <div class="buttons-example__label">Icon stroked buttons</div>
        <div class="buttons-example__list">
          <button type="button" button view="stroked" isIcon>
            <app-icon name="mail" />
          </button>
          <button type="button" button view="stroked" isIcon color="primary">
            <app-icon name="mail" />
          </button>
          <button type="button" button view="stroked" isIcon color="secondary">
            <app-icon name="mail" />
          </button>
          <button
            type="button"
            button
            view="stroked"
            isIcon
            color="primary"
            disabled>
            <app-icon name="mail" />
          </button>
        </div>
      </div>
    </app-tab>
    <app-tab label="HTML">
      @if (fileContents['exampleHtml']) {
        <pre><code [highlightAuto]="fileContents['exampleHtml']"></code></pre>
      }
    </app-tab>
    <app-tab label="TS">
      @if (fileContents['exampleTs']) {
        <pre><code [highlightAuto]="fileContents['exampleTs']"></code></pre>
      }
    </app-tab>
    <app-tab label="SCSS">
      @if (fileContents['exampleScss']) {
        <pre><code [highlightAuto]="fileContents['exampleScss']"></code></pre>
      }
    </app-tab>
  </app-tab-group>
</app-example>
